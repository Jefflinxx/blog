site_name: My Blog
site_description: Notes and essays about software, AI, and building on the web.
site_url: https://jefflinxx.github.io/blog/
repo_url: https://github.com/Jefflinxx/blog
repo_name: Jefflinxx/blog

theme:
  name: material
  custom_dir: overrides
  language: zh-TW
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: teal
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Writing:
      - writing/index.md

plugins:
  - search
  - blog:
      blog_dir: writing
      post_dir: "{blog}/posts"
      post_date_format: full
      post_url_format: "{slug}"
      archive: false
      categories: true
      categories_name: Categories
      categories_url_format: "category/{slug}"
  - rss:
      match_path: "writing/posts/.*"
      use_git: false
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - redirects
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Jefflinxx
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/analytics.js
